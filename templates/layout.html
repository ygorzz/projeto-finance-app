<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.4/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" defer>

</head>

<body>

    <header class="pb-5">
        <nav class="navbar-expand-lg navbar bg-primary fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="/dashboard">FinanceApp</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria -label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar"
                    aria-labelledby="offcanvasNavbarLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">FinanceApp</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body bg-primary">
                        {% if session.user_id %}
                        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                            <li class="nav-item">
                                <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" aria-current="page" href="{{url_for('dashboard')}}">Dashboard</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if request.endpoint == 'cash_flow' %}active{% endif %}" href="{{url_for('cash_flow')}}">Fluxo de Caixa</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if request.endpoint == 'budget' %}active{% endif %}" href="{{url_for('budget')}}">Orçamento</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if request.endpoint == 'categories' %}active{% endif %}" href="{{url_for('categories')}}">Categorias</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if request.endpoint == 'history' %}active{% endif %}" href="{{url_for('history')}}">Histórico</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{{url_for('logout')}}">Logout</a>
                            </li>
                        </ul>
                        {% else %}
                        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                            <li class="nav-item">
                                <a class="nav-link {% if request.endpoint == 'login' %}active{% endif %}" aria-current="page" href="{{url_for('login')}}">Login</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link {% if request.endpoint == 'register' %}active{% endif %}" href="{{url_for('register')}}">Registrar</a>
                            </li>
                        </ul>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="pt-5">
        {% block main %} {% endblock %}
    </main>
    
    <script src="{{url_for('static', filename='../static/js/utils/main.js')}}"></script>
    {% block script %} {% endblock %}
    
</body>

</html>
